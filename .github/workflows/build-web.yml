name: Build Web Version

on:
  workflow_dispatch:

jobs:
  build-web:
    name: Build shapez.io Web
    runs-on: ubuntu-latest
    
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg default-jre

      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile
          cd gulp && yarn install --frozen-lockfile

      - name: Generate Local Config & Translations
        run: cd gulp && yarn gulp localConfig.findOrCreate && yarn gulp translations.fullBuild

      - name: Build All (Resources + JS + CSS + HTML)
        run: |
          cd gulp
          yarn gulp build.web-localhost.resourcesAndCode
          yarn gulp css.prod
          yarn gulp html.web-localhost.prod
        env:
          SHAPEZ_CLI_SERVER_HOST: localhost
          SHAPEZ_CLI_ALPHA_FTP_USER: x
          SHAPEZ_CLI_ALPHA_FTP_PW: x
          SHAPEZ_CLI_STAGING_FTP_USER: x
          SHAPEZ_CLI_STAGING_FTP_PW: x
          SHAPEZ_CLI_LIVE_FTP_USER: x
          SHAPEZ_CLI_LIVE_FTP_PW: x
          SHAPEZ_CLI_APPLE_ID: x
          SHAPEZ_CLI_APPLE_CERT_NAME: x
          SHAPEZ_CLI_GITHUB_USER: x
          SHAPEZ_CLI_GITHUB_TOKEN: x

      - name: Collect all build outputs
        run: |
          echo "=== Searching for index.html ==="
          find . -name "index.html" -not -path "*/node_modules/*" | head -10
          echo "=== Searching for main.css ==="
          find . -name "main.css" -not -path "*/node_modules/*" | head -10
          echo "=== Searching for *.css in build ==="
          find build/ -name "*.css" 2>/dev/null | head -10
          echo "=== All HTML files ==="
          find . -name "*.html" -not -path "*/node_modules/*" | head -20
          echo "=== Copy missing files to build/ ==="
          # Copy index.html if found outside build/
          for f in $(find . -name "index.html" -not -path "*/node_modules/*" -not -path "./build/*"); do
            echo "Copying $f to build/"
            cp "$f" build/
          done
          # Copy main.css if found outside build/
          for f in $(find . -name "main.css" -not -path "*/node_modules/*" -not -path "./build/*"); do
            echo "Copying $f to build/"
            cp "$f" build/
          done
          echo "=== Final build/ ==="
          find build/ -type f | sort | head -50
          echo "=== Size ==="
          du -sh build/

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapez-web-build
          path: build/
          retention-days: 7
